<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 600" font-family="'Segoe UI',system-ui,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6b7280"/></marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#2f7d5b"/></marker>
    <marker id="ao" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#e07b00"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#7a3fd0"/></marker>
  </defs>
  <rect x="0" y="0" width="990" height="600" fill="#f6f7f9"/>
  <text x="30" y="40" font-size="21" font-weight="700" fill="#1a1d24">rsudp システム全体構成</text>
  <text x="30" y="62" font-size="13" fill="#79808f">Raspberry Shake の地震データ受信 → 保存 → 監視 → 配信</text>

  <!-- 外部アクター -->
  <rect x="30" y="90" width="150" height="66" rx="10" fill="#fff3e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="105" y="120" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">Raspberry Shake</text>
  <text x="105" y="140" font-size="11" fill="#79808f" text-anchor="middle">UDP :8888</text>

  <rect x="30" y="390" width="150" height="66" rx="10" fill="#fff3e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="105" y="420" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">気象庁 API</text>
  <text x="105" y="440" font-size="11" fill="#79808f" text-anchor="middle">JMA list / detail JSON</text>

  <rect x="30" y="480" width="150" height="66" rx="10" fill="#f2ebfc" stroke="#7a3fd0" stroke-width="1.5"/>
  <text x="105" y="510" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">ブラウザ / SNS</text>
  <text x="105" y="530" font-size="11" fill="#79808f" text-anchor="middle">React UI · OGP</text>

  <!-- rsudp 本体 -->
  <rect x="245" y="90" width="200" height="90" rx="10" fill="#eaf1ff" stroke="#2f6fed" stroke-width="1.5"/>
  <text x="345" y="116" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">rsudp 本体 (Docker)</text>
  <text x="345" y="137" font-size="11" fill="#4a5160" text-anchor="middle">STA/LTA 検出・波形プロット</text>
  <text x="345" y="154" font-size="11" fill="#4a5160" text-anchor="middle">patch/ 適用済み</text>
  <text x="345" y="171" font-size="11" fill="#79808f" text-anchor="middle">unix-start-rsudp.sh</text>

  <!-- 永続データ -->
  <rect x="245" y="220" width="200" height="70" rx="10" fill="#e7f5ee" stroke="#2f7d5b" stroke-width="1.5"/>
  <text x="345" y="247" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">スクリーンショット PNG</text>
  <text x="345" y="267" font-size="11" fill="#79808f" text-anchor="middle">data/screenshots/YYYY/MM/DD/</text>
  <text x="345" y="283" font-size="11" fill="#79808f" text-anchor="middle">PREFIX-UTC.png（tEXt: MaxCount 他）</text>

  <rect x="245" y="320" width="200" height="56" rx="10" fill="#e7f5ee" stroke="#2f7d5b" stroke-width="1.5"/>
  <text x="345" y="345" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">miniSEED 波形</text>
  <text x="345" y="364" font-size="11" fill="#79808f" text-anchor="middle">data/data/（zstd 圧縮対象）</text>

  <!-- rsudp-webui プロセス -->
  <rect x="510" y="86" width="290" height="300" rx="12" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.5"/>
  <text x="524" y="110" font-size="12" font-weight="700" fill="#2f6fed" letter-spacing="0.5">rsudp-webui プロセス</text>

  <rect x="528" y="124" width="254" height="118" rx="9" fill="#eaf1ff" stroke="#2f6fed" stroke-width="1.2"/>
  <text x="542" y="146" font-size="12.5" font-weight="700" fill="#1a1d24">BackgroundMonitor</text>
  <text x="542" y="167" font-size="11" fill="#4a5160">・_scan_incremental … 60 秒毎</text>
  <text x="542" y="185" font-size="11" fill="#4a5160">・_crawl_earthquakes … 1 時間毎</text>
  <text x="542" y="203" font-size="11" fill="#4a5160">・_compress_data … 1 日毎</text>
  <text x="542" y="221" font-size="11" fill="#4a5160">・DB state watcher → SSE</text>
  <text x="542" y="236" font-size="10.5" fill="#79808f">monitor.py</text>

  <rect x="528" y="256" width="254" height="114" rx="9" fill="#eaf1ff" stroke="#2f6fed" stroke-width="1.2"/>
  <text x="542" y="278" font-size="12.5" font-weight="700" fill="#1a1d24">Flask app（Blueprint: viewer_api）</text>
  <text x="542" y="299" font-size="11" fill="#4a5160">・/rsudp/api/screenshot · earthquake</text>
  <text x="542" y="317" font-size="11" fill="#4a5160">・/rsudp/api/statistics（4 種）</text>
  <text x="542" y="335" font-size="11" fill="#4a5160">・SSE event · 静的配信（dist）</text>
  <text x="542" y="353" font-size="11" fill="#4a5160">viewer.py / statistics.py / schemas.py</text>

  <!-- 右カラム: Slack + DB -->
  <rect x="830" y="90" width="130" height="76" rx="10" fill="#fff3e0" stroke="#e07b00" stroke-width="1.5"/>
  <text x="895" y="120" font-size="12.5" font-weight="700" fill="#1a1d24" text-anchor="middle">Slack</text>
  <text x="895" y="139" font-size="10" fill="#79808f" text-anchor="middle">info: 検出/照合</text>
  <text x="895" y="153" font-size="10" fill="#79808f" text-anchor="middle">（error: healthz）</text>

  <rect x="820" y="220" width="150" height="62" rx="10" fill="#e7f5ee" stroke="#2f7d5b" stroke-width="1.5"/>
  <text x="895" y="246" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">cache.db</text>
  <text x="895" y="266" font-size="10.5" fill="#79808f" text-anchor="middle">screenshot_metadata</text>

  <rect x="820" y="310" width="150" height="62" rx="10" fill="#e7f5ee" stroke="#2f7d5b" stroke-width="1.5"/>
  <text x="895" y="336" font-size="13" font-weight="700" fill="#1a1d24" text-anchor="middle">quake.db</text>
  <text x="895" y="356" font-size="10.5" fill="#79808f" text-anchor="middle">earthquakes</text>

  <!-- CLI -->
  <rect x="560" y="470" width="240" height="66" rx="10" fill="#f2f3f6" stroke="#cfd4dc" stroke-width="1.2"/>
  <text x="680" y="493" font-size="12" font-weight="700" fill="#1a1d24" text-anchor="middle">CLI（同一パッケージ）</text>
  <text x="680" y="512" font-size="10.5" fill="#79808f" text-anchor="middle">rsudp-healthz / rsudp-cleaner</text>
  <text x="680" y="527" font-size="10.5" fill="#79808f" text-anchor="middle">rsudp-compress</text>

  <!-- flows -->
  <!-- Shake -> rsudp -->
  <path d="M180,123 L245,127" fill="none" stroke="#e07b00" stroke-width="1.6" marker-end="url(#ao)"/>
  <text x="196" y="114" font-size="10" fill="#e07b00">UDP</text>
  <!-- rsudp -> PNG -->
  <path d="M345,180 L345,220" fill="none" stroke="#2f7d5b" stroke-width="1.6" marker-end="url(#ag)"/>
  <!-- rsudp -> miniSEED（PNG ボックスの左を迂回） -->
  <path d="M285,180 C230,230 222,290 243,338" fill="none" stroke="#2f7d5b" stroke-width="1.4" marker-end="url(#ag)"/>
  <!-- PNG -> monitor (scan) -->
  <path d="M445,250 C485,245 495,215 522,195" fill="none" stroke="#6b7280" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="455" y="228" font-size="10" fill="#6b7280">scan</text>
  <!-- JMA -> monitor (crawl)（miniSEED ボックスの下を迂回） -->
  <path d="M180,420 C340,448 492,392 527,238" fill="none" stroke="#e07b00" stroke-width="1.4" marker-end="url(#ao)"/>
  <text x="230" y="452" font-size="10" fill="#e07b00">crawl（毎時取得）</text>
  <!-- monitor -> Slack -->
  <path d="M782,140 L830,120" fill="none" stroke="#e07b00" stroke-width="1.4" marker-end="url(#ao)"/>
  <!-- monitor -> DB write -->
  <path d="M782,200 L820,238" fill="none" stroke="#2f7d5b" stroke-width="1.4" marker-end="url(#ag)"/>
  <path d="M782,230 C798,272 806,302 817,318" fill="none" stroke="#2f7d5b" stroke-width="1.4" marker-end="url(#ag)"/>
  <text x="796" y="212" font-size="10" fill="#2f7d5b">write</text>
  <!-- DB -> Flask read -->
  <path d="M820,330 C800,332 790,322 784,314" fill="none" stroke="#6b7280" stroke-width="1.4" marker-end="url(#a)"/>
  <text x="792" y="345" font-size="10" fill="#6b7280">read</text>
  <!-- Flask -> browser -->
  <path d="M590,370 C450,470 300,478 184,498" fill="none" stroke="#7a3fd0" stroke-width="1.4" marker-end="url(#ap)"/>
  <text x="390" y="500" font-size="10" fill="#7a3fd0">REST / SSE / OGP</text>
  <!-- CLI -> data（点線） -->
  <path d="M560,492 C505,478 475,430 452,382" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <text x="580" y="462" font-size="10" fill="#79808f">data/ · DB を参照</text>
</svg>
