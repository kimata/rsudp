<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 560" font-family="'Segoe UI',system-ui,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#6b7280"/></marker>
    <marker id="ap" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#7a3fd0"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="560" fill="#f6f7f9"/>
  <text x="30" y="40" font-size="21" font-weight="700" fill="#1a1d24">フロントエンド構成（frontend/src）</text>
  <text x="30" y="62" font-size="13" fill="#79808f">React + TypeScript + Tailwind CSS + Chart.js。Vite でビルドし、Flask が dist/ を静的配信する</text>

  <!-- App -->
  <rect x="300" y="90" width="340" height="130" rx="10" fill="#f2ebfc" stroke="#7a3fd0" stroke-width="1.6"/>
  <text x="470" y="114" font-size="14" font-weight="700" fill="#1a1d24" text-anchor="middle">App.tsx</text>
  <text x="470" y="136" font-size="11" fill="#4a5160" text-anchor="middle">タブ切替（一覧 / 統計）· フィルタ状態の保持</text>
  <text x="470" y="153" font-size="11" fill="#4a5160" text-anchor="middle">URL 同期（pushState / replaceState / popstate）</text>
  <text x="470" y="170" font-size="11" fill="#4a5160" text-anchor="middle">getJstDateParts() で timestamp から JST の</text>
  <text x="470" y="187" font-size="11" fill="#4a5160" text-anchor="middle">年/月/日を導出しクライアント側で日付分類</text>
  <text x="470" y="207" font-size="10" fill="#79808f" text-anchor="middle">選択画像は ?file= として URL に反映（OGP 共有用）</text>

  <!-- components -->
  <text x="30" y="262" font-size="12" font-weight="700" fill="#7a3fd0">components/</text>
  <g>
    <rect x="30" y="274" width="170" height="52" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
    <text x="115" y="296" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">DateSelector</text>
    <text x="115" y="313" font-size="10" fill="#79808f" text-anchor="middle">年/月/日の階層選択（JST）</text>

    <rect x="215" y="274" width="170" height="52" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
    <text x="300" y="296" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">SignalFilter</text>
    <text x="300" y="313" font-size="10" fill="#79808f" text-anchor="middle">MaxCount 閾値スライダー</text>

    <rect x="400" y="274" width="170" height="52" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
    <text x="485" y="296" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">FileList</text>
    <text x="485" y="313" font-size="10" fill="#79808f" text-anchor="middle">一覧・選択</text>

    <rect x="585" y="274" width="170" height="52" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
    <text x="670" y="296" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">ImageViewer</text>
    <text x="670" y="313" font-size="10" fill="#79808f" text-anchor="middle">表示・キー/スワイプ操作・全画面</text>

    <rect x="770" y="274" width="140" height="52" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
    <text x="840" y="296" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">StatisticsPage</text>
    <text x="840" y="313" font-size="10" fill="#79808f" text-anchor="middle">Chart.js 4 チャート</text>
  </g>
  <text x="30" y="348" font-size="10.5" fill="#79808f">ほか: Footer（sysinfo 表示）· Icon（SVG アイコン）</text>

  <!-- hooks -->
  <text x="30" y="392" font-size="12" font-weight="700" fill="#7a3fd0">hooks/</text>
  <rect x="30" y="404" width="280" height="66" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
  <text x="170" y="426" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">useAutoRefresh</text>
  <text x="170" y="443" font-size="10" fill="#79808f" text-anchor="middle">EventSource で /rsudp/api/event を購読し</text>
  <text x="170" y="458" font-size="10" fill="#79808f" text-anchor="middle">DB 更新イベントで再フェッチ（自動再接続付き）</text>

  <rect x="330" y="404" width="200" height="66" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
  <text x="430" y="426" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">useApi</text>
  <text x="430" y="443" font-size="10" fill="#79808f" text-anchor="middle">fetch + 任意間隔ポーリング</text>
  <text x="430" y="458" font-size="10" fill="#79808f" text-anchor="middle">（Footer の sysinfo で使用）</text>

  <rect x="550" y="404" width="240" height="66" rx="8" fill="#ffffff" stroke="#cfd4dc" stroke-width="1.3"/>
  <text x="670" y="426" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">useScreenshotNavigation</text>
  <text x="670" y="443" font-size="10" fill="#79808f" text-anchor="middle">前後移動・プリロード</text>

  <!-- api / utils -->
  <rect x="30" y="494" width="420" height="52" rx="8" fill="#eaf1ff" stroke="#2f6fed" stroke-width="1.4"/>
  <text x="240" y="514" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">api.ts — axios クライアント</text>
  <text x="240" y="532" font-size="10" fill="#4a5160" text-anchor="middle">/rsudp/api/screenshot（一覧・最新・統計・scan）· /rsudp/api/statistics（4 種）</text>

  <rect x="470" y="494" width="440" height="52" rx="8" fill="#eaf1ff" stroke="#2f6fed" stroke-width="1.4"/>
  <text x="690" y="514" font-size="11.5" font-weight="700" fill="#1a1d24" text-anchor="middle">utils/dateTime.ts · types.ts</text>
  <text x="690" y="532" font-size="10" fill="#4a5160" text-anchor="middle">dayjs で JST 固定表示（formatDateTime / formatEarthquakeDateTime）· API 型は schemas.py と対応</text>

  <!-- arrows -->
  <path d="M380,220 L200,274" fill="none" stroke="#7a3fd0" stroke-width="1.3" marker-end="url(#ap)"/>
  <path d="M440,220 L330,274" fill="none" stroke="#7a3fd0" stroke-width="1.3" marker-end="url(#ap)"/>
  <path d="M480,220 L490,274" fill="none" stroke="#7a3fd0" stroke-width="1.3" marker-end="url(#ap)"/>
  <path d="M540,220 L650,274" fill="none" stroke="#7a3fd0" stroke-width="1.3" marker-end="url(#ap)"/>
  <path d="M600,220 L810,274" fill="none" stroke="#7a3fd0" stroke-width="1.3" marker-end="url(#ap)"/>
  <path d="M330,140 C220,160 170,300 165,404" fill="none" stroke="#6b7280" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#a)"/>
</svg>
